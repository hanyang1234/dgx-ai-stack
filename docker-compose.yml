---
# =============================================================================
# AI Stack – Docker Compose
# NVIDIA DGX Spark / Ubuntu host
#
# Services:
#   ollama           – Standalone Ollama (GPU-accelerated, updatable independently)
#   open-webui       – Open WebUI (points to ollama service)
#   openclaw-gateway – OpenClaw agent gateway (non-root, LAN-accessible)
#
# Shared network: ai-stack (bridge)
# Named volumes:  open-webui, open-webui-ollama
# Host bind mounts:
#   ~/openclaw-config  → /home/node/.openclaw  (OpenClaw config + memory)
#   ~/openclaw/workspace → /home/node/workspace (agent working directory)
#
# PORT MAP
#   0.0.0.0:12000 → open-webui:8080     Open WebUI (public on this host)
#   0.0.0.0:11435 → ollama:11434        Ollama API (Tailscale + LAN accessible)
#   0.0.0.0:18789 → openclaw-gateway:18789  OpenClaw gateway (token auth required)
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Ollama – standalone, GPU-accelerated, updatable independently of Open WebUI
  # Models stored in named volume open-webui-ollama (preserved across updates)
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ports:
      # Exposed on all interfaces so Mac can reach it via Tailscale (100.x.x.x)
      - "0.0.0.0:11435:11434"
    volumes:
      - open-webui-ollama:/root/.ollama
    environment:
      # Only keep one model loaded at a time — prevents two 120b models from
      # competing for memory (each needs ~63 GiB on 128 GiB DGX Spark).
      OLLAMA_MAX_LOADED_MODELS: "2"
      # Force CUDA v13 library selection for DGX Spark GB10 — prevents silent
      # CPU fallback on container restart (known Ollama issue on GB10 hardware).
      OLLAMA_LLM_LIBRARY: "cuda_v13"
      OLLAMA_FLASH_ATTENTION: "1"
      # Evict models 10 minutes after last use. Prevents large models loaded in
      # Open WebUI (e.g. nemotron 86 GB) from blocking cron jobs at 6am.
      # Default is 5m; 10m gives a comfortable buffer for long Web UI responses
      # without leaving models warm all night.
      OLLAMA_KEEP_ALIVE: "10m"
    networks:
      - ai-stack

  # ---------------------------------------------------------------------------
  # Open WebUI – connects to standalone Ollama service
  # ---------------------------------------------------------------------------
  open-webui:
    image: ghcr.io/open-webui/open-webui:latest
    container_name: open-webui
    restart: unless-stopped
    depends_on:
      - ollama
    ports:
      - "12000:8080"
    volumes:
      - open-webui:/app/backend/data
    environment:
      # Point to standalone Ollama container
      OLLAMA_BASE_URL: "http://ollama:11434"
      SCARF_NO_ANALYTICS: "true"
      DO_NOT_TRACK: "true"
      ANONYMIZED_TELEMETRY: "false"
      # Open WebUI secret key – leave blank to auto-generate, or set in .env
      WEBUI_SECRET_KEY: "${WEBUI_SECRET_KEY:-}"
    networks:
      - ai-stack
    env_file:
      - path: .env
        required: false

  # ---------------------------------------------------------------------------
  # OpenClaw Gateway
  # Runs as user 'node' (non-root, baked into image)
  # ---------------------------------------------------------------------------
  openclaw-gateway:
    image: ghcr.io/openclaw/openclaw:2026.4.12
    container_name: openclaw-gateway
    restart: unless-stopped
    depends_on:
      - ollama
    ports:
      # Exposed on LAN for web UI access (token auth required)
      - "0.0.0.0:18789:18789"
    volumes:
      # Config + agent memory: bind-mount for easy host inspection and backup
      - type: bind
        source: ${HOME}/openclaw-config
        target: /home/node/.openclaw
      # Agent working directory
      - type: bind
        source: ${HOME}/openclaw/workspace
        target: /home/node/workspace
    environment:
      # Bind gateway to all interfaces inside container for LAN access
      OPENCLAW_GATEWAY_BIND: "lan"
      OPENCLAW_EXEC_HOST: "gateway"
      # Primary LLM provider
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      # Gateway bearer token (required for all API calls)
      OPENCLAW_GATEWAY_TOKEN: "${OPENCLAW_GATEWAY_TOKEN}"
      # Optional messaging integrations
      TELEGRAM_TOKEN: "${TELEGRAM_TOKEN:-}"
      # Ollama provider base URL – uses standalone ollama container
      OPENCLAW_OLLAMA_BASE_URL: "http://ollama:11434/v1"
    # Symlink /media → /tmp/openclaw so Telegram image downloads resolve (via
    # realpath) to an allowed media root (OpenClaw v2026.4.x security change).
    # Must run setup as root to replace the root-owned /media directory.
    user: root
    command: >
      sh -c "rm -rf /media && ln -sf /tmp/openclaw /media
      && exec runuser -u node -- node openclaw.mjs gateway --allow-unconfigured"
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    networks:
      - ai-stack
    env_file:
      - .env

# =============================================================================
# Networks
# =============================================================================
networks:
  ai-stack:
    name: ai-stack
    external: true   # Created manually: docker network create --driver bridge ai-stack

# =============================================================================
# Volumes
# Named volumes preserve Open WebUI database and downloaded Ollama models
# across container restarts and image updates.
# =============================================================================
volumes:
  open-webui:
    external: true   # Preserves existing Open WebUI data
  open-webui-ollama:
    external: true   # Preserves all downloaded Ollama models
